name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build OpenSnap
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      DERIVED_DATA_PATH: build/OpenSnapDerivedData
      APP_PATH: build/OpenSnapDerivedData/Build/Products/Debug/OpenSnap.app
      ARTIFACT_PATH: artifacts/OpenSnap-macOS.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        run: swift build

      - name: Build native app
        run: >-
          xcodebuild
          -project OpenSnap.xcodeproj
          -scheme OpenSnap
          -configuration Debug
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Run tests
        run: swift test

      - name: Verify native app
        run: test -d "$APP_PATH"

      # Signing, notarization, DMG, and release steps can be inserted after verification.
      - name: Package native app
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARTIFACT_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenSnap-macOS.zip
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 30
