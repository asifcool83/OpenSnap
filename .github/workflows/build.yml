name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build OpenSnap
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        run: swift build

      - name: Build native app
        run: >-
          xcodebuild
          -project OpenSnap.xcodeproj
          -scheme OpenSnap
          -configuration Debug
          -derivedDataPath "$RUNNER_TEMP/OpenSnapDerivedData"
          CODE_SIGNING_ALLOWED=NO
          build
