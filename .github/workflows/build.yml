name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build OpenSnap
    runs-on: macos-15
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      DERIVED_DATA_PATH: build/OpenSnapDerivedData
      BUILD_CONFIGURATION: Beta
      APP_PATH: build/OpenSnapDerivedData/Build/Products/Beta/OpenSnap.app
      ARTIFACT_PATH: artifacts/OpenSnap-macOS.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        run: swift build

      - name: Build native app
        run: >-
          xcodebuild
          -project OpenSnap.xcodeproj
          -scheme OpenSnap
          -configuration "$BUILD_CONFIGURATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"
          OPEN_SNAP_GIT_COMMIT="$GITHUB_SHA"
          OPEN_SNAP_GIT_BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          build

      - name: Run tests
        run: swift test

      - name: Verify native app
        run: |
          test -d "$APP_PATH"
          test -x "$APP_PATH/Contents/MacOS/OpenSnap"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Contents/Info.plist")" = "$GITHUB_RUN_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :OpenSnapGitCommit' "$APP_PATH/Contents/Info.plist")" = "$GITHUB_SHA"

      # Signing, notarization, DMG, and release steps can be inserted after verification.
      - name: Package native app
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARTIFACT_PATH"
          unzip -t "$ARTIFACT_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenSnap-macOS.zip
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 30
